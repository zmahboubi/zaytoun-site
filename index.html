<body class="lang-en">

<!-- ═══ LANGUAGE BAR ═══ -->
<nav class="lang-bar" id="langBar">
  <a class="brand-logo" href="#">
    <img src="https://res.cloudinary.com/dlidh4fdt/image/upload/img_00_uxsu6j" alt="Arabesque Residences">

<!-- ═══ The only change is in the <script> section below ═══ -->
<script>
// ═══════════════════════════════════════════════════════════
// GOOGLE SHEETS CONFIGURATION (NO EMAIL FALLBACK)
// ═══════════════════════════════════════════════════════════
// 👇 REPLACE THIS URL WITH YOUR ACTUAL APPS SCRIPT WEB APP URL
const SHEET_API_URL = 'https://script.google.com/macros/s/AKfycbzJQGq1wi5UxXFFw4Ofpy1G8E-DH5oFqPaE_uNzWoiOF-rc-4pvTNhamiyqKDKohdNFXQ/exec';

// Helper function – sends data only to the sheet, never to email
async function sendToSheet(action, data) {
  const payload = { action, ...data };
  try {
    const res = await fetch(SHEET_API_URL, {
      method: 'POST',
      mode: 'cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    // For CORS, the response may be opaque; we just assume success if no error
    console.log(`[Zaytoun] ${action} sent to sheet`);
    return { status: 'ok' };
  } catch (err) {
    console.error('[Zaytoun] Sheet API error:', err);
    // Show a user-friendly alert – but do NOT send an email
    alert('Unable to save your information. Please try again or refresh the page.');
    return { error: err.message };
  }
}

// Referral code from URL or localStorage
const urlParams = new URLSearchParams(window.location.search);
const REF_CODE = urlParams.get('ref') || localStorage.getItem('zyt_ref') || 'ZYT-ZAKARIA-00';
if (REF_CODE) localStorage.setItem('zyt_ref', REF_CODE);
if (REF_CODE && REF_CODE !== 'ZYT-ZAKARIA-00') {
  const banner = document.getElementById('refBanner');
  if (banner) {
    banner.style.display = 'block';
    const nameEl = banner.querySelector('.ref-name');
    if (nameEl) nameEl.textContent = REF_CODE.split('-')[1] || REF_CODE;
  }
}

function unlockItems(ids) {
  ids.forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.style.background = 'rgba(61,90,43,0.15)';
    el.style.borderColor = 'rgba(90,140,60,0.5)';
    const icon = el.querySelector('.lock-icon');
    if (icon) {
      icon.innerHTML = '<polyline points="20 6 9 17 4 12"/>';
      icon.style.stroke = '#7AAD5A';
    }
  });
}

// LEVEL 1 HANDLER (name + email)
async function handleGateL1(e) {
  e.preventDefault();
  const fname = document.getElementById('fname1').value.trim();
  const email = document.getElementById('email1').value.trim();
  if (!fname || !email) return;

  const btn = e.target.querySelector('button[type="submit"]');
  if (btn) btn.disabled = true;

  await sendToSheet('lead_l1', { fname, email, lang: 'en', ref_code: REF_CODE });

  document.getElementById('gateFormL1').style.display = 'none';
  document.getElementById('gateL1Success').style.display = 'block';
  unlockItems(['lock-villas', 'lock-price']);

  const dossier = document.getElementById('dossier');
  dossier.classList.add('visible');
  document.querySelectorAll('.tab-btn').forEach(tab => {
    const tabId = tab.getAttribute('data-tab');
    if (tabId === 'villas' || tabId === 'interiors') {
      tab.style.opacity = '1';
      tab.style.pointerEvents = 'auto';
    } else {
      tab.style.opacity = '0.3';
      tab.style.pointerEvents = 'none';
    }
  });
  setTimeout(() => dossier.scrollIntoView({ behavior: 'smooth' }), 300);
  if (btn) btn.disabled = false;
}

// LEVEL 2 HANDLER (full details) – NO EMAIL SENDING
async function handleGateSubmit(e) {
  e.preventDefault();
  const btn = e.target.querySelector('button[type="submit"]');
  if (btn) { btn.textContent = 'Unlocking…'; btn.disabled = true; }

  const payload = {
    fname: document.getElementById('fname1').value.trim(),
    lname: document.getElementById('lname').value.trim(),
    email: document.getElementById('email1').value.trim(),
    phone: document.getElementById('phone').value.trim(),
    country: document.getElementById('country').value,
    intent: document.getElementById('intent').value,
    lang: 'en',
    ref_code: REF_CODE
  };
  await sendToSheet('lead_l2', payload);

  unlockItems(['lock-plans1', 'lock-plans2', 'lock-payment', 'lock-handover']);
  document.querySelectorAll('.tab-btn').forEach(tab => {
    tab.style.opacity = '1';
    tab.style.pointerEvents = 'auto';
  });
  document.getElementById('gateL1Success').style.display = 'none';
  document.getElementById('gateSuccess').classList.add('show');
  const dossier = document.getElementById('dossier');
  dossier.classList.add('visible');
  setTimeout(() => dossier.scrollIntoView({ behavior: 'smooth' }), 600);
  if (btn) btn.disabled = false;
}

// Language switcher
let currentLang = 'en';
function setLang(lang, btn) {
  currentLang = lang;
  document.documentElement.lang = lang;
  document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
  document.body.className = 'lang-' + lang;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
}
document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => setLang(btn.getAttribute('data-lang'), btn));
});

// Tab system
function showTab(tabId, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  const target = document.getElementById('tab-' + tabId);
  if (target) target.classList.add('active');
  if (btn) btn.classList.add('active');
}
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const tabId = btn.getAttribute('data-tab');
    if (tabId) showTab(tabId, btn);
  });
});

// Scroll effects
const langBar = document.getElementById('langBar');
window.addEventListener('scroll', () => {
  if (window.scrollY > 80) langBar.classList.add('scrolled');
  else langBar.classList.remove('scrolled');
});
const observer = new IntersectionObserver((entries) => {
  entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); } });
}, { threshold: 0.15 });
document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
</script>
</body>
</html>
